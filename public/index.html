<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>NestX · Bot Status</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap');

    :root {
      --bg:        #0a0a0f;
      --surface:   #111118;
      --border:    rgba(255,255,255,0.07);
      --text:      #e8e8f0;
      --muted:     #6b6b80;
      --online:    #22c55e;
      --error:     #ef4444;
      --starting:  #f59e0b;
      --accent:    #7c3aed;
      --accent-dim:#7c3aed22;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'Inter', sans-serif;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 48px 16px 80px;
    }

    /* ── Header ── */
    header {
      text-align: center;
      margin-bottom: 48px;
    }

    .logo {
      font-size: 36px;
      margin-bottom: 8px;
      filter: drop-shadow(0 0 20px rgba(124,58,237,0.5));
    }

    h1 {
      font-size: 22px;
      font-weight: 600;
      letter-spacing: -0.3px;
      color: var(--text);
    }

    .subtitle {
      font-size: 13px;
      color: var(--muted);
      margin-top: 4px;
    }

    /* ── Overall status bar ── */
    .overall {
      display: flex;
      align-items: center;
      gap: 8px;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 10px 18px;
      margin-bottom: 40px;
      font-size: 13px;
      font-weight: 500;
    }

    .overall-dot {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background: var(--muted);
      transition: background 0.3s;
    }

    .overall-dot.all-online { background: var(--online); box-shadow: 0 0 8px var(--online); }
    .overall-dot.has-error  { background: var(--error);  box-shadow: 0 0 8px var(--error);  }
    .overall-dot.starting   { background: var(--starting); }

    /* ── Grid ── */
    .grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
      gap: 16px;
      width: 100%;
      max-width: 920px;
    }

    /* ── Bot card ── */
    .card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 16px;
      padding: 24px;
      display: flex;
      flex-direction: column;
      gap: 16px;
      transition: border-color 0.2s;
    }

    .card:hover { border-color: rgba(124,58,237,0.3); }

    .card-header {
      display: flex;
      align-items: flex-start;
      justify-content: space-between;
      gap: 12px;
    }

    .card-icon {
      font-size: 28px;
      line-height: 1;
      filter: drop-shadow(0 0 10px rgba(124,58,237,0.3));
    }

    .card-title {
      font-size: 15px;
      font-weight: 600;
      color: var(--text);
      line-height: 1.2;
    }

    .card-desc {
      font-size: 12px;
      color: var(--muted);
      margin-top: 2px;
      line-height: 1.5;
    }

    /* ── Status badge ── */
    .badge {
      display: inline-flex;
      align-items: center;
      gap: 5px;
      padding: 4px 10px;
      border-radius: 20px;
      font-size: 11px;
      font-weight: 600;
      letter-spacing: 0.3px;
      white-space: nowrap;
    }

    .badge-dot {
      width: 6px;
      height: 6px;
      border-radius: 50%;
      flex-shrink: 0;
    }

    .badge.online   { background: rgba(34,197,94,0.12);  color: var(--online);   }
    .badge.online .badge-dot   { background: var(--online);  box-shadow: 0 0 6px var(--online); animation: pulse 2s infinite; }
    .badge.error    { background: rgba(239,68,68,0.12);  color: var(--error);    }
    .badge.error .badge-dot    { background: var(--error);   }
    .badge.starting { background: rgba(245,158,11,0.12); color: var(--starting); }
    .badge.starting .badge-dot { background: var(--starting); }

    @keyframes pulse {
      0%, 100% { opacity: 1; }
      50%       { opacity: 0.4; }
    }

    /* ── Stats ── */
    .stats {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 10px;
    }

    .stat {
      background: rgba(255,255,255,0.03);
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 10px 12px;
    }

    .stat-label {
      font-size: 10px;
      color: var(--muted);
      text-transform: uppercase;
      letter-spacing: 0.6px;
      font-weight: 600;
      margin-bottom: 4px;
    }

    .stat-value {
      font-family: 'JetBrains Mono', monospace;
      font-size: 14px;
      font-weight: 500;
      color: var(--text);
    }

    .stat-value.accent { color: var(--accent); }

    /* ── Error box ── */
    .error-box {
      background: rgba(239,68,68,0.08);
      border: 1px solid rgba(239,68,68,0.2);
      border-radius: 8px;
      padding: 8px 12px;
      font-family: 'JetBrains Mono', monospace;
      font-size: 11px;
      color: var(--error);
      word-break: break-all;
    }

    /* ── System uptime card ── */
    .system-card {
      background: var(--accent-dim);
      border: 1px solid rgba(124,58,237,0.2);
      border-radius: 16px;
      padding: 20px 24px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 16px;
      width: 100%;
      max-width: 920px;
      margin-bottom: 16px;
      flex-wrap: wrap;
      gap: 12px;
    }

    .system-label {
      font-size: 12px;
      color: var(--muted);
      margin-bottom: 2px;
    }

    .system-value {
      font-family: 'JetBrains Mono', monospace;
      font-size: 15px;
      font-weight: 500;
      color: var(--text);
    }

    /* ── Last updated ── */
    .last-updated {
      font-size: 11px;
      color: var(--muted);
      margin-top: 32px;
      text-align: center;
    }

    .last-updated span {
      font-family: 'JetBrains Mono', monospace;
      color: var(--text);
    }

    /* ── Refresh btn ── */
    .refresh-btn {
      background: none;
      border: 1px solid var(--border);
      color: var(--muted);
      padding: 6px 14px;
      border-radius: 8px;
      font-size: 12px;
      cursor: pointer;
      font-family: 'Inter', sans-serif;
      margin-top: 10px;
      transition: all 0.2s;
    }

    .refresh-btn:hover { border-color: var(--accent); color: var(--text); }

    .spinning { animation: spin 0.8s linear infinite; display: inline-block; }
    @keyframes spin { to { transform: rotate(360deg); } }
  </style>
</head>
<body>

  <header>
    <div class="logo">🐉</div>
    <h1>NestX · Bot Status</h1>
    <p class="subtitle">Live health dashboard for all running bots</p>
  </header>

  <div class="overall">
    <div class="overall-dot" id="overall-dot"></div>
    <span id="overall-text">Checking status…</span>
  </div>

  <div class="system-card" id="system-card" style="display:none">
    <div>
      <div class="system-label">System Uptime</div>
      <div class="system-value" id="sys-uptime">—</div>
    </div>
    <div>
      <div class="system-label">Started At</div>
      <div class="system-value" id="sys-started">—</div>
    </div>
    <div>
      <div class="system-label">Health URL</div>
      <div class="system-value" id="sys-url" style="font-size:12px;color:#7c3aed">—</div>
    </div>
  </div>

  <div class="grid" id="grid">
    <!-- Cards injected by JS -->
  </div>

  <div class="last-updated">
    Last updated: <span id="last-updated-time">—</span>
    <br>
    <button class="refresh-btn" id="refresh-btn" onclick="fetchHealth()">⟳ Refresh</button>
  </div>

  <script>
    // ── Config: point this at your Render service URL ────────────────────────
    // If this page is hosted on the same service, use relative path.
    // Otherwise set: const HEALTH_URL = "https://nestx-bots.onrender.com/health";
    const HEALTH_URL = "/health";

    const BOT_META = {
      drogon:    { icon: "🐉", desc: "Telegram lookup bot — search records by email or mobile." },
      igReel:    { icon: "📸", desc: "Posts Instagram reels you send to the NestX chat." },
      tgForward: { icon: "📡", desc: "Notifies you on Telegram when someone messages on NestX." },
    };

    const STAT_LABELS = {
      drogon:    { count: "Queries", last: "Last Query",    key: "queries",   lastKey: "last_query"    },
      igReel:    { count: "Posts",   last: "Last Post",     key: "posts",     lastKey: "last_post"     },
      tgForward: { count: "Forwarded", last: "Last Fwd",   key: "forwarded", lastKey: "last_forwarded" },
    };

    function timeSince(iso) {
      if (!iso) return "—";
      const s = Math.floor((Date.now() - new Date(iso)) / 1000);
      if (s < 60)   return `${s}s ago`;
      if (s < 3600) return `${Math.floor(s/60)}m ago`;
      if (s < 86400)return `${Math.floor(s/3600)}h ago`;
      return `${Math.floor(s/86400)}d ago`;
    }

    function formatDate(iso) {
      if (!iso) return "—";
      return new Date(iso).toLocaleString(undefined, { dateStyle: "medium", timeStyle: "short" });
    }

    function renderCard(id, bot) {
      const meta = BOT_META[id] || { icon: "🤖", desc: "" };
      const sl   = STAT_LABELS[id] || { count: "Count", last: "Last Active", key: "count", lastKey: "last_active" };
      const statusClass = bot.status === "online" ? "online" : bot.status === "error" ? "error" : "starting";
      const statusLabel = bot.status === "online" ? "Online" : bot.status === "error" ? "Error" : "Starting";
      const count = bot[sl.key] ?? "—";
      const lastTime = timeSince(bot[sl.lastKey]);

      return `
        <div class="card">
          <div class="card-header">
            <div>
              <div class="card-icon">${meta.icon}</div>
            </div>
            <div style="flex:1">
              <div class="card-title">${bot.name}</div>
              <div class="card-desc">${meta.desc}</div>
            </div>
            <div>
              <span class="badge ${statusClass}">
                <span class="badge-dot"></span>
                ${statusLabel}
              </span>
            </div>
          </div>

          <div class="stats">
            <div class="stat">
              <div class="stat-label">${sl.count}</div>
              <div class="stat-value accent">${count}</div>
            </div>
            <div class="stat">
              <div class="stat-label">${sl.last}</div>
              <div class="stat-value">${lastTime}</div>
            </div>
          </div>

          ${bot.error ? `<div class="error-box">⚠ ${bot.error}</div>` : ""}
        </div>
      `;
    }

    async function fetchHealth() {
      const btn = document.getElementById("refresh-btn");
      btn.innerHTML = '<span class="spinning">⟳</span> Refreshing…';
      btn.disabled = true;

      try {
        const res  = await fetch(HEALTH_URL);
        const data = await res.json();

        // System card
        document.getElementById("sys-uptime").textContent  = data.uptime || "—";
        document.getElementById("sys-started").textContent = formatDate(data.started_at);
        document.getElementById("sys-url").textContent     = window.location.origin + "/health";
        document.getElementById("system-card").style.display = "";

        // Bot cards
        const grid = document.getElementById("grid");
        const bots = data.bots || {};
        grid.innerHTML = Object.entries(bots).map(([id, bot]) => renderCard(id, bot)).join("");

        // Overall status
        const statuses = Object.values(bots).map(b => b.status);
        const dot = document.getElementById("overall-dot");
        const txt = document.getElementById("overall-text");
        if (statuses.every(s => s === "online")) {
          dot.className = "overall-dot all-online";
          txt.textContent = "All systems operational";
        } else if (statuses.some(s => s === "error")) {
          dot.className = "overall-dot has-error";
          const errored = Object.entries(bots).filter(([,b]) => b.status === "error").map(([,b]) => b.name).join(", ");
          txt.textContent = `Issue detected · ${errored}`;
        } else {
          dot.className = "overall-dot starting";
          txt.textContent = "Bots starting up…";
        }

      } catch (e) {
        document.getElementById("overall-dot").className = "overall-dot has-error";
        document.getElementById("overall-text").textContent = "Could not reach health endpoint";
        document.getElementById("grid").innerHTML = `
          <div class="card" style="grid-column:1/-1">
            <div class="error-box">⚠ Failed to fetch /health — make sure HEALTH_URL is set correctly in this page.<br><br>${e.message}</div>
          </div>`;
      }

      document.getElementById("last-updated-time").textContent = new Date().toLocaleTimeString();
      btn.innerHTML = "⟳ Refresh";
      btn.disabled = false;
    }

    // Auto-refresh every 60 seconds
    fetchHealth();
    setInterval(fetchHealth, 60_000);
  </script>
</body>
</html>
